<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>数独 Sudoku</title>
    <link rel="stylesheet" href="style.css?v=4">
    <script src="main.js?v=4" defer></script>
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="game-wrapper">
        <header class="game-header">
            <h1>数独</h1>
            <p class="subtitle">S &nbsp; U &nbsp; D &nbsp; O &nbsp; K &nbsp; U</p>
        </header>

        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-icon">✗</span>
                <span id="error-counter">0</span>
                <span class="stat-label">错误</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-item">
                <span class="stat-icon">◷</span>
                <span id="timer">00:00</span>
            </div>
        </div>

        <div id="sudoku-container">
            <!-- Grid rendered by JS -->
        </div>

        <div id="controls">
            <div class="difficulty-section">
                <div class="difficulty-header">
                    <span class="difficulty-title">难度</span>
                    <span id="difficulty-badge" class="difficulty-badge diff-1">超易</span>
                </div>
                <input type="range" id="difficulty-slider" class="slider" min="1" max="5" value="1">
                <div class="difficulty-marks">
                    <span>超易</span>
                    <span>容易</span>
                    <span>中等</span>
                    <span>较难</span>
                    <span>超难</span>
                </div>
            </div>

            <div class="button-group">
                <button id="start-button" class="btn btn-primary">开始游戏</button>
                <button id="rules-button" class="btn btn-secondary">游戏规则</button>
            </div>
        </div>

        <div id="message"></div>
    </div>

    <!-- Rules Modal -->
    <div id="rules-modal" class="modal">
        <div class="modal-content">
            <button class="close-button">&times;</button>
            <h2>游戏规则</h2>
            <div class="rules-list">
                <div class="rule-item">
                    <span class="rule-num">1</span>
                    <p>在 9×9 的棋盘上填入数字 1 到 9</p>
                </div>
                <div class="rule-item">
                    <span class="rule-num">2</span>
                    <p>每行的数字不重复</p>
                </div>
                <div class="rule-item">
                    <span class="rule-num">3</span>
                    <p>每列的数字不重复</p>
                </div>
                <div class="rule-item">
                    <span class="rule-num">4</span>
                    <p>每个 3×3 宫格内的数字不重复</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const modal = document.getElementById("rules-modal");
        const btn = document.getElementById("rules-button");
        const closeBtn = document.querySelector(".close-button");

        btn.onclick = () => modal.classList.add('visible');
        closeBtn.onclick = () => modal.classList.remove('visible');
        window.onclick = (e) => { if (e.target === modal) modal.classList.remove('visible'); };
    </script>
</body>
</html>
